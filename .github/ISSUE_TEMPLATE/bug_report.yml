name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I click Download selected, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect to a share
        2. Select ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: See Help → About.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Copy any text from the log area at the bottom of the app. Do NOT include the share password.
      render: text
